name: Gradle

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-paper-1-21:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build core for Paper 1.21
        run: ./gradlew :core:build "-PmarisTarget=paper-1.21"
