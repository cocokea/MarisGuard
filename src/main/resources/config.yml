# ===== LoadingScreenRemover =====
debug: false
track-ticks: 80
# Keep death respawn packets allowed longer than normal world-change tracking.
# This prevents the client from getting stuck on the respawn screen when extra RESPAWN packets are sent.
death-bypass-ticks: 200
aggressive-same-environment: true

# ===== RayTraceAntiXray =====
settings:
  anti-xray:
    update-ticks: 4
    ms-per-ray-trace-tick: 75
    ray-trace-threads: 2

# Per-world anti-xray toggles and raytrace tuning.
world-settings:
  default:
    anti-xray:
      ray-trace: true
      ray-trace-third-person: false
      ray-trace-distance: 32.0
      rehide-blocks: false
      rehide-distance: .inf
      max-ray-trace-block-count-per-chunk: 24
      ray-trace-blocks: []
  world_the_end:
    anti-xray:
      ray-trace: false
  spawn:
    anti-xray:
      ray-trace: false
  afk:
    anti-xray:
      ray-trace: false
  duels:
    anti-xray:
      ray-trace: false

# ===== AntiEsp =====
# Maximum distance used by AntiEsp masked-block reveal checks.
# Reveal now also requires a clear raytrace path to the block.
reveal-radius: 64
# How often masked block visibility refreshes, in ticks.
refresh-period-ticks: 10
mask-material: AIR
antiesp:
  mask-block-entity-packets: true
  sensitive-blocks:
    - BEACON
    - BREWING_STAND
    - CHEST
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - COMPARATOR
    - CONDUIT
    - DAYLIGHT_DETECTOR
    - DISPENSER
    - DROPPER
    - ENCHANTING_TABLE
    - ENDER_CHEST
    - END_PORTAL_FRAME
    - FURNACE
    - LECTERN
    - HOPPER
    - JUKEBOX
    - NOTE_BLOCK
    - REPEATER
    - TRAPPED_CHEST
    - CRAFTING_TABLE
    - BARREL
    - BELL
    - JIGSAW
    - BEEHIVE
    - BEE_NEST
    - SCULK_SENSOR
    - CALIBRATED_SCULK_SENSOR
    - SCULK_CATALYST
    - SCULK_SHRIEKER
    - CHISELED_BOOKSHELF
    - DECORATED_POT
    - SMOKER
    - BLAST_FURNACE
    - CRAFTER
    - SPAWNER
    - TRIAL_SPAWNER
    - VAULT
    - PISTON
    - STICKY_PISTON
  sensitive-suffixes:
    - _SHULKER_BOX
    - _BED
    - _BANNER
    - _WALL_BANNER
    - _HEAD
    - _WALL_HEAD
    - _SKULL
    - _WALL_SKULL

# Worlds where anti-ESP and anti-xray behavior are disabled.
blacklist-worlds:
  - world_the_end
  - spawn
  - afk
  - duels

# Database backend for violation storage.
storage:
  type: sqlite
  sqlite:
    file: violations.db
  mysql:
    host: 127.0.0.1
    port: 3306
    database: antiesp
    username: root
    password: ''
    properties: useSSL=false&characterEncoding=utf8&serverTimezone=UTC
  pool:
    maximum-pool-size: 4
    minimum-idle: 1
    connection-timeout-ms: 10000

# ===== Player Visibility Raytrace =====
# Hides player entity packets client-side when all sampled rays are blocked.
# This does not call hidePlayer/hideEntity and does not remove players from tablist.
player-visibility-raytrace:
  enabled: true
  worlds:
    - world
  max-distance: 24.0
  check-period-ticks: 20
  max-targets-per-tick: 2
  candidate-refresh-ticks: 10
