reveal-radius: 20
refresh-period-ticks: 6
mask-material: AIR

blacklist-worlds:
  - world_the_end
  - spawn
  - afk
  - duels

antiesp:
  mask-block-entity-packets: false
  sensitive-blocks:
    - BEACON
    - BREWING_STAND
    - CHEST
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - COMPARATOR
    - CONDUIT
    - DAYLIGHT_DETECTOR
    - DISPENSER
    - DROPPER
    - ENCHANTING_TABLE
    - ENDER_CHEST
    - END_PORTAL_FRAME
    - FURNACE
    - LECTERN
    - HOPPER
    - JUKEBOX
    - NOTE_BLOCK
    - REPEATER
    - TRAPPED_CHEST
    - CRAFTING_TABLE
    - BARREL
    - BELL
    - JIGSAW
    - BEEHIVE
    - BEE_NEST
    - SCULK_SENSOR
    - CALIBRATED_SCULK_SENSOR
    - SCULK_CATALYST
    - SCULK_SHRIEKER
    - CHISELED_BOOKSHELF
    - DECORATED_POT
    - SMOKER
    - BLAST_FURNACE
    - CRAFTER
    - SPAWNER
    - TRIAL_SPAWNER
    - VAULT
    - PISTON
    - STICKY_PISTON
  sensitive-suffixes:
    - _SHULKER_BOX
    - _BED
    - _BANNER
    - _WALL_BANNER
    - _HEAD
    - _WALL_HEAD
    - _SKULL
    - _WALL_SKULL

esper:
  enabled: true
  punishable: true
  punishment-delay-in-seconds: 0
  max-violations: 7
  punishment-commands:
    - 'tempban %player% 30m use esp'
  duration-seconds: 15
  spawn-distance: 10.5
  forward-offset: 2.0
  trigger-distance: 2.0
  auto-check:
    enabled: true
    interval-ticks: 60
    max-players-per-cycle: 2
    cooldown-seconds: 90
    max-active-sessions: 4
    require-survival: true
    require-recent-mining: true
    recent-mining-window-seconds: 45
    max-y: 29
