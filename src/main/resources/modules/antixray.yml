settings:
  anti-xray:
    update-ticks: 3
    ms-per-ray-trace-tick: 60
    ray-trace-threads: 2
    blacklist-worlds:
      - world_the_end
      - spawn
      - afk
      - duels

world-settings:
  default:
    anti-xray:
      ray-trace: true
      ray-trace-third-person: false
      ray-trace-distance: 40.0
      rehide-blocks: false
      rehide-distance: .inf
      max-ray-trace-block-count-per-chunk: 32
      ray-trace-blocks: []
  world_the_end:
    anti-xray:
      ray-trace: false
  spawn:
    anti-xray:
      ray-trace: false
  afk:
    anti-xray:
      ray-trace: false
  duels:
    anti-xray:
      ray-trace: false
