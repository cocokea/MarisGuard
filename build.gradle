group = 'com.maris7'
version = '2.0'

ext {
    marisTarget = (findProperty('marisTarget') ?: 'paper-26_1_2').toString()
    defaultJavaRelease = marisTarget == 'paper-26_1_2' ? 25 : 21
}

subprojects {
    apply plugin: 'java'

    group = rootProject.group
    version = rootProject.version

    repositories {
        mavenCentral()
        maven { url = uri('https://repo.papermc.io/repository/maven-public/') }
        maven { url = uri('https://repo.codemc.io/repository/maven-releases/') }
        maven { url = uri('https://repo.codemc.io/repository/maven-snapshots/') }
        maven { url = uri('https://libraries.minecraft.net/') }
        maven { url = uri('https://jitpack.io') }
    }

    configurations.configureEach {
        resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
    }

    java {
        toolchain.languageVersion = JavaLanguageVersion.of(rootProject.ext.defaultJavaRelease)
        sourceCompatibility = JavaVersion.toVersion(rootProject.ext.defaultJavaRelease)
        targetCompatibility = JavaVersion.toVersion(rootProject.ext.defaultJavaRelease)
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release.set(rootProject.ext.defaultJavaRelease)
    }
}

tasks.register('buildPaper26_1_2') {
    dependsOn ':core:shadowJar'
}

tasks.register('buildPaper1_21') {
    dependsOn ':core:compileJava'
}

tasks.register('buildPaper1_20') {
    dependsOn ':core:compileJava'
}
